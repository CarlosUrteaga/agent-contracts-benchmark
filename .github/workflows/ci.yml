name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate scaffold
        run: python3 scripts/validate_protocol.py
      - name: Materialize benchmark
        run: python3 -m tools.governor.materialize_benchmark --out .
      - name: Run tests
        run: python3 -m unittest discover -s tests -p 'test*.py'
      - name: Validate contracts
        run: python3 -m tools.governor.validate_all --runs benchmark/manifests --contracts contracts --out results/governor_results.jsonl
      - name: Generate reconstruction cases
        run: python3 scripts/create_reconstruction_branches.py --apply
      - name: Validate reconstruction cases
        run: python3 scripts/validate_reconstruction_branches.py --root benchmark/reconstruction
