contract_id: contract.base
applies_to_arm: base
required_artifacts: []
required_manifest_fields:
  - arm
  - strategy
  - replication
  - step
  - changed_files
  - changed_file_count
  - change_spread
  - traceability_ratio
  - test_failures
  - contract_violations
  - run_ledger_compliance
  - capabilities_present
  - governance_artifacts_present
preconditions:
  - Manifest must have the benchmark core fields.
invariants:
  - Traceability ratio is perfect for valid traces.
  - Contract violations remain zero for valid traces.
  - Test failures remain zero for valid traces.
postconditions:
  - C6 requires run ledger compliance.
violation_rules:
  - rule_id: contract.arm_match
    severity: high
    kind: consistent_arm_contract
  - rule_id: traceability.perfect
    severity: high
    kind: field_equals
    field: traceability_ratio
    expected: 1.0
  - rule_id: contracts.zero_violations
    severity: high
    kind: field_equals
    field: contract_violations
    expected: 0
  - rule_id: tests.zero_failures
    severity: high
    kind: field_equals
    field: test_failures
    expected: 0
  - rule_id: ledger.required_at_c6
    severity: high
    kind: step_field_equals
    step: C6
    field: run_ledger_compliance
    expected: true
  - rule_id: ledger.artifact_exists
    severity: medium
    kind: ledger_required_when_flagged
